<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://webapi.amap.com/maps?v=2.0&key=ffd74ab3f94bb8b9c9fe9acfd3366848"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

        #update-time {

        .custom-marker {

        .ripple {

        @keyframes ripple-animation {
            0% { width: 100%; height: 100%; opacity: 0.8; transform: scale(1); }

        #detail-panel {

        #detail-panel.show {

        #detail-panel .panel-header {
            display: flex;
            justify-content: space-between;

            margin-bottom: 20px;

        #detail-panel .stats-grid {

        #detail-panel .stat-item {

        #detail-panel .stat-item .label {

        #detail-panel .chart-section {

        }
        .message.user {
            background: linear-gradient(135deg, #4ecdc4, #1890ff);
            color: #fff;

        .chat-input-area {
            padding: 12px 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;

            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);

            border-color: rgba(78,205,196,0.6);

        .chat-send-btn {

            height: 40px;
            border-radius: 50%;

            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;

        .chat-quick-actions {
            padding: 8px 16px 0;
            display: flex;

            gap: 8px;
        }

            padding: 6px 12px;

            border: 1px solid rgba(255,255,255,0.2);

            transition: all 0.2s;

        .quick-btn:hover {
            background: rgba(78,205,196,0.2);
            border-color: rgba(78,205,196,0.5);
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="title-bar">
        <h1>西湖景区实时客流看板</h1>
        <p>实时监控各景点人流密度，智能预警拥堵区域</p>
    </div>

    <div id="stats-bar">
        <div class="stat-card">
            <div class="value" id="total-visitors">0</div>
            <div class="label">总游客数</div>
        </div>
        <div class="stat-card">
            <div class="value" id="crowded-count">0</div>
            <div class="label">拥挤景点</div>
        </div>
        <div class="stat-card">
            <div class="value" id="smooth-count">0</div>
            <div class="label">畅通景点</div>
        </div>
    </div>

    <div id="update-time">数据更新于: --</div>

    <div id="legend">
        <div style="font-weight:bold; margin-bottom:8px; color:rgba(255,255,255,0.9);">拥挤度图例</div>
        <div class="item"><div class="dot" style="background:#1890ff;"></div>空闲 (< 300人)</div>
        <div class="item"><div class="dot" style="background:#52c41a;"></div>舒适 (300-600人)</div>
        <div class="item"><div class="dot" style="background:#faad14;"></div>较挤 (600-1000人)</div>
        <div class="item"><div class="dot" style="background:#ff4d4f;"></div>拥挤 (> 1000人)</div>
    </div>

    <div id="loading">正在加载地图数据...</div>
    <div id="map-container"></div>

    <button id="chat-fab" onclick="toggleChat()">
        💬
    </button>

    <div id="chat-panel">
        <div class="chat-header">
            <h3>🤖 西湖智能导游</h3>
            <button class="close-chat" onclick="toggleChat()">×</button>
        </div>
        <div class="chat-quick-actions">
            <button class="quick-btn" onclick="sendQuickMessage('预测断桥')">预测断桥</button>
            <button class="quick-btn" onclick="sendQuickMessage('路线 断桥 雷峰塔')">路线规划</button>
            <button class="quick-btn" onclick="sendQuickMessage('帮助')">帮助</button>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chat-input" placeholder="输入问题，如：预测断桥" onkeypress="handleChatKeypress(event)">
            <button class="chat-send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <div id="detail-panel">
        <div class="panel-header">
            <h2 id="panel-title">景点详情</h2>
            <button class="close-btn" onclick="closeDetailPanel()">×</button>
        </div>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="label">当前人流</div>
                <div class="value" id="panel-current">0</div>
            </div>
            <div class="stat-item">
                <div class="label">承载上限</div>
                <div class="value" id="panel-capacity">0</div>
            </div>
            <div class="stat-item">
                <div class="label">饱和度</div>
                <div class="value" id="panel-saturation">0%</div>
            </div>
            <div class="stat-item">
                <div class="label">今日峰值</div>
                <div class="value" id="panel-peak">0</div>
            </div>
            <div class="stat-item">
                <div class="label">当前排名</div>
                <div class="value" id="panel-rank">--</div>
            </div>
            <div class="stat-item">
                <div class="label">1小时变化</div>
                <div class="value" id="panel-trend">--</div>
            </div>
            <div class="stat-item">
                <div class="label">状态</div>
                <div class="value" id="panel-status">--</div>
            </div>
            <div class="stat-item">
                <div class="label">建议时段</div>
                <div class="value" id="panel-suggestion">--</div>
            </div>
        </div>
        <div class="chart-section">
            <h3>过去24小时人流趋势</h3>
            <div id="chart-container"></div>
        </div>
        <div class="suggestion-box">
            <h3>游览建议</h3>
            <p id="panel-suggestion-text">点击地图上的景点查看详细建议</p>
        </div>
    </div>

    <script>
        const SPOTS = [
            { id: 'duanqiao', name: '断桥', lng: 120.1489, lat: 30.2638, capacity: 1500 },
            { id: 'sudi', name: '苏堤', lng: 120.1366, lat: 30.2434, capacity: 2000 },
            { id: 'leifeng', name: '雷峰塔', lng: 120.1570, lat: 30.2396, capacity: 1200 },
            { id: 'lingyin', name: '灵隐寺', lng: 120.1072, lat: 30.2410, capacity: 1800 },
            { id: 'santan', name: '三潭印月', lng: 120.1467, lat: 30.2420, capacity: 1000 },
            { id: 'hubin', name: '湖滨', lng: 120.1600, lat: 30.2540, capacity: 3000 },
            { id: 'taiziwan', name: '太子湾', lng: 120.1480, lat: 30.2330, capacity: 800 },
            { id: 'quyuan', name: '曲院风荷', lng: 120.1300, lat: 30.2630, capacity: 1000 },
            { id: 'baidi', name: '白堤', lng: 120.1450, lat: 30.2570, capacity: 1800 },
            { id: 'huagang', name: '花港观鱼', lng: 120.1380, lat: 30.2260, capacity: 1200 },
        ];

        const POPULARITY = {
            'duanqiao': 1.2, 'sudi': 1.0, 'leifeng': 0.9, 'lingyin': 0.8,
            'santan': 0.7, 'hubin': 1.1, 'taiziwan': 0.6, 'quyuan': 0.75,
            'baidi': 1.0, 'huagang': 0.85
        };

        function getTimeFactor() {
            const hour = new Date().getHours();
            if (hour >= 6 && hour < 8) return 0.15;
            if (hour >= 8 && hour < 10) return 0.35;
            if (hour >= 10 && hour < 12) return 0.55;
            if (hour >= 12 && hour < 14) return 0.70;
            if (hour >= 14 && hour < 17) return 0.90;
            if (hour >= 17 && hour < 19) return 0.70;
            if (hour >= 19 && hour < 21) return 0.40;
            if (hour >= 21 && hour < 23) return 0.15;
            return 0.05;
        }

        function getStatus(crowd, capacity) {
            const ratio = crowd / capacity;
            if (ratio < 0.2) return { status: 'idle', color: '#1890ff', label: '空闲', level: 0 };
            if (ratio < 0.4) return { status: 'smooth', color: '#52c41a', label: '舒适', level: 1 };
            if (ratio < 0.67) return { status: 'crowded', color: '#faad14', label: '较挤', level: 2 };
            return { status: 'saturated', color: '#ff4d4f', label: '拥挤', level: 3 };
        }

        function getMockData() {
            const timeFactor = getTimeFactor();
            let totalVisitors = 0;
            let crowdedCount = 0;
            let smoothCount = 0;

            const data = SPOTS.map(spot => {
                const randomFactor = 0.85 + Math.random() * 0.30;
                const pop = POPULARITY[spot.id] || 1.0;
                const crowd = Math.floor(spot.capacity * timeFactor * randomFactor * pop);
                const finalCrowd = Math.min(crowd, spot.capacity);
                const status = getStatus(finalCrowd, spot.capacity);

                totalVisitors += finalCrowd;
                if (status.level >= 2) crowdedCount++;
                if (status.level <= 1) smoothCount++;

                return {
                    ...spot,
                    crowd: finalCrowd,
                    status: status
                };
            });

            return { data, totalVisitors, crowdedCount, smoothCount };
        }

        function generateHistoryData(spotId, capacity, currentCrowd) {
            const hours = [];
            const values = [];
            const now = new Date();
            const currentHour = now.getHours();
            const pop = POPULARITY[spotId] || 1.0;
            
            let maxValue = 0;

            for (let i = 23; i >= 0; i--) {
                const h = (currentHour - i + 24) % 24;
                hours.push(`${h.toString().padStart(2, '0')}:00`);
                
                let baseFactor;
                if (h >= 6 && h < 8) baseFactor = 0.15;
                else if (h >= 8 && h < 10) baseFactor = 0.35;
                else if (h >= 10 && h < 12) baseFactor = 0.55;
                else if (h >= 12 && h < 14) baseFactor = 0.70;
                else if (h >= 14 && h < 17) baseFactor = 0.90;
                else if (h >= 17 && h < 19) baseFactor = 0.70;
                else if (h >= 19 && h < 21) baseFactor = 0.40;
                else if (h >= 21 && h < 23) baseFactor = 0.15;
                else baseFactor = 0.05;

                let value;
                if (i === 0) {
                    value = currentCrowd;
                } else {
                    const randomFactor = 0.8 + Math.random() * 0.4;
                    value = Math.floor(capacity * baseFactor * randomFactor * pop);
                    value = Math.min(value, capacity);
                    value = Math.max(value, Math.floor(capacity * 0.02));
                }

                if (value > maxValue) maxValue = value;
                values.push(value);
            }

            return { hours, values, maxValue };
        }

        function getTrendInfo(current, historyData) {
            if (!historyData || historyData.values.length < 2) {
                return { trend: 'flat', percent: 0 };
            }
            const oneHourAgo = historyData.values[historyData.values.length - 2];
            if (oneHourAgo === 0) return { trend: 'flat', percent: 0 };
            const change = current - oneHourAgo;
            const percent = ((change / oneHourAgo) * 100).toFixed(1);
            let trend = 'flat';
            if (change > 5) trend = 'up';
            else if (change < -5) trend = 'down';
            return { trend, percent: parseFloat(percent), change };
        }

        function getSuggestedTime(capacity) {
            const now = new Date().getHours();
            const suggestions = [
                { start: 6, end: 9, label: '6:00-9:00' },
                { start: 13, end: 14, label: '13:00-14:00' },
                { start: 20, end: 22, label: '20:00-22:00' }
            ];
            
            for (const s of suggestions) {
                if (now < s.start || now >= s.end) {
                    return s.label;
                }
            }
            return '13:00-14:00';
        }

        function getRank(currentCrowd, allData) {
            const sorted = [...allData].sort((a, b) => b.crowd - a.crowd);
            const rank = sorted.findIndex(s => s.id === currentCrowd.id) + 1;
            return `${rank}/${sorted.length}`;
        }

        function updateStats(result) {
            document.getElementById('total-visitors').textContent = result.totalVisitors.toLocaleString();
            document.getElementById('crowded-count').textContent = result.crowdedCount;
            document.getElementById('smooth-count').textContent = result.smoothCount;
        }

        function updateTimestamp() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('update-time').textContent = `数据更新于: ${timeStr}`;
        }

        let map = null;
        let markers = [];
        let infoWindow = null;
        let refreshTimer = null;
        let chartInstance = null;
        let currentSpotData = null;
        let cachedHistoryData = {};

        function createMarker(spotData) {
            const ratio = spotData.crowd / spotData.capacity;
            const size = 18 + ratio * 35;
            
            const markerDiv = document.createElement('div');
            markerDiv.className = 'custom-marker';
            markerDiv.style.width = size + 'px';
            markerDiv.style.height = size + 'px';
            markerDiv.style.backgroundColor = spotData.status.color;
            markerDiv.style.color = spotData.status.color;
            markerDiv.__spotData = spotData;
            
            const rippleDiv = document.createElement('div');
            rippleDiv.className = 'ripple';
            rippleDiv.style.color = spotData.status.color;
            markerDiv.appendChild(rippleDiv);

            const textDiv = document.createElement('div');
            textDiv.textContent = spotData.name;
            textDiv.style.position = 'absolute';
            textDiv.style.top = '100%';
            textDiv.style.left = '50%';
            textDiv.style.transform = 'translateX(-50%)';
            textDiv.style.marginTop = '4px';
            textDiv.style.whiteSpace = 'nowrap';
            textDiv.style.fontSize = '12px';
            textDiv.style.fontWeight = 'bold';
            textDiv.style.color = '#fff';
            textDiv.style.textShadow = '0 0 4px rgba(0,0,0,0.8)';
            markerDiv.appendChild(textDiv);

            markerDiv.addEventListener('click', function() {
                const ratio = (spotData.crowd / spotData.capacity * 100).toFixed(1);
                const historyData = generateHistoryData(spotData.id, spotData.capacity, spotData.crowd);
                cachedHistoryData[spotData.id] = historyData;
                currentSpotData = spotData;
                
                const trendInfo = getTrendInfo(spotData.crowd, historyData);
                
                const trendIcon = trendInfo.trend === 'up' ? '↑' : trendInfo.trend === 'down' ? '↓' : '→';
                const trendClass = trendInfo.trend;
                const trendPercent = trendInfo.percent >= 0 ? `+${trendInfo.percent}%` : `${trendInfo.percent}%`;

                const content = `
                    <div style="font-weight:bold;font-size:15px;margin-bottom:8px;color:#fff;">${spotData.name}</div>
                    <div style="line-height:1.8;font-size:13px;">
                        <span style="color:#aaa;">当前人流:</span> <span style="color:#4ecdc4;font-weight:bold;">${spotData.crowd}</span> 人<br/>
                        <span style="color:#aaa;">承载上限:</span> ${spotData.capacity} 人<br/>
                        <span style="color:#aaa;">饱和度:</span> ${ratio}%<br/>
                        <span style="color:#aaa;">状态:</span> <span style="color:${spotData.status.color};font-weight:bold;">${spotData.status.label}</span>
                    </div>
                    <div class="trend-indicator ${trendClass}" style="margin-top:8px;">
                        ${trendIcon} 相比1小时前 ${trendPercent}
                    </div>
                    <button class="detail-btn" onclick="showDetailPanel('${spotData.id}')">
                        查看详情
                    </button>
                `;
                infoWindow.setContent(content);
                infoWindow.open(map, [spotData.lng, spotData.lat]);
            });

            const marker = new AMap.Marker({
                position: [spotData.lng, spotData.lat],
                content: markerDiv,
                offset: new AMap.Pixel(-size/2, -size/2)
            });
            return marker;
        }

        function renderMarkers(data) {
            markers.forEach(m => map.remove(m));
            markers = [];
            
            data.forEach(spot => {
                const marker = createMarker(spot);
                markers.push(marker);
            });
            map.add(markers);
        }

        function initMap() {
            map = new AMap.Map('map-container', {
                center: [120.135, 30.248],
                zoom: 13,
                resizeEnable: true,
                mapStyle: 'amap://styles/blue_night'
            });

            infoWindow = new AMap.InfoWindow({
                offset: new AMap.Pixel(0, -30),
                content: '',
                closeWhenClickMap: true
            });

            map.on('complete', function() {
                document.getElementById('loading').style.display = 'none';
                const result = getMockData();
                updateStats(result);
                renderMarkers(result.data);
                updateTimestamp();
                startRealtimeUpdate();
            });
        }

        function updateData() {
            const result = getMockData();
            updateStats(result);
            renderMarkers(result.data);
            updateTimestamp();
        }

        function startRealtimeUpdate() {
            refreshTimer = setInterval(updateData, 8000);
        }

        function stopRealtimeUpdate() {
            if (refreshTimer) {
                clearInterval(refreshTimer);
                refreshTimer = null;
            }
        }

        function checkAndInit() {
            if (typeof AMap !== 'undefined') {
                initMap();
            } else {
                setTimeout(checkAndInit, 200);
            }
        }
        checkAndInit();

        window.addEventListener('resize', () => {
            if (map) map.resize();
            if (chartInstance) chartInstance.resize();
        });

        window.addEventListener('beforeunload', stopRealtimeUpdate);

        let currentDetailData = null;

        function renderChart(hours, values, currentHour, capacity) {
            const chartDom = document.getElementById('chart-container');
            if (!chartDom) return;

            if (!chartInstance) {
                chartInstance = echarts.init(chartDom);
            }

            const now = new Date();
            const currentIndex = hours.length - 1;
            
            const markLineData = [];
            hours.forEach((h, i) => {
                if (h === '09:00' || h === '10:00') {
                    markLineData.push({ xAxis: i, lineStyle: { color: '#ff4d4f', width: 2, type: 'dashed' }, label: { formatter: '早高峰', color: '#ff4d4f', fontSize: 10 } });
                }
                if (h === '17:00' || h === '18:00') {
                    markLineData.push({ xAxis: i, lineStyle: { color: '#faad14', width: 2, type: 'dashed' }, label: { formatter: '晚高峰', color: '#faad14', fontSize: 10 } });
                }
            });

            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(0,0,0,0.8)',
                    borderColor: 'rgba(78,205,196,0.3)',
                    textStyle: { color: '#fff' },
                    formatter: function(params) {
                        const data = params[0];
                        return `${data.name}<br/>人流量: <strong>${data.value}</strong> 人`;
                    }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    top: '10%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: hours,
                    axisLine: { lineStyle: { color: 'rgba(255,255,255,0.2)' } },
                    axisLabel: { color: 'rgba(255,255,255,0.6)', fontSize: 10 },
                    splitLine: { show: false }
                },
                yAxis: {
                    type: 'value',
                    max: capacity,
                    axisLine: { lineStyle: { color: 'rgba(255,255,255,0.2)' } },
                    axisLabel: { color: 'rgba(255,255,255,0.6)', fontSize: 10 },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
                },
                series: [
                    {
                        name: '人流量',
                        type: 'line',
                        data: values,
                        smooth: true,
                        symbol: 'circle',
                        symbolSize: 6,
                        lineStyle: { color: '#4ecdc4', width: 3 },
                        itemStyle: { color: '#4ecdc4', borderWidth: 2, borderColor: '#fff' },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(78,205,196,0.4)' },
                                { offset: 1, color: 'rgba(78,205,196,0.05)' }
                            ])
                        },
                        markPoint: {
                            data: [
                                { type: 'max', name: '峰值', itemStyle: { color: '#ff4d4f' } },
                                { coord: [currentIndex, values[currentIndex]], name: '当前', itemStyle: { color: '#fff', borderColor: '#4ecdc4', borderWidth: 3 } }
                            ],
                            label: { color: '#fff', fontSize: 10 }
                        },
                        markLine: {
                            data: markLineData
                        }
                    }
                ]
            };

            chartInstance.setOption(option);
        }

        function showDetailPanel(spotId) {
            infoWindow.close();
            
            const spotData = currentSpotData;
            const historyData = cachedHistoryData[spotId];
            
            if (!spotData || !historyData) return;
            
            const { crowd, capacity, name, status } = spotData;
            const saturation = (crowd / capacity * 100).toFixed(1);
            const trendInfo = getTrendInfo(crowd, historyData);
            const suggestedTime = getSuggestedTime(capacity);

            document.getElementById('panel-title').textContent = `${name} - 详情`;
            document.getElementById('panel-current').textContent = crowd.toLocaleString();
            document.getElementById('panel-capacity').textContent = capacity.toLocaleString();
            document.getElementById('panel-saturation').textContent = saturation + '%';
            document.getElementById('panel-peak').textContent = historyData.maxValue.toLocaleString();
            
            const allData = markers.map(m => {
                const div = m.getContent();
                if (div && div.__spotData) return div.__spotData;
                return null;
            }).filter(Boolean);
            
            let rank = '--';
            if (allData.length > 0) {
                const sorted = [...allData].sort((a, b) => b.crowd - a.crowd);
                const idx = sorted.findIndex(s => s.id === spotId);
                if (idx >= 0) rank = `${idx + 1}/${sorted.length}`;
            }
            document.getElementById('panel-rank').textContent = rank;
            
            const trendEl = document.getElementById('panel-trend');
            const trendIcon = trendInfo.trend === 'up' ? '↑' : trendInfo.trend === 'down' ? '↓' : '→';
            const trendPercent = trendInfo.percent >= 0 ? `+${trendInfo.percent}%` : `${trendInfo.percent}%`;
            trendEl.textContent = `${trendIcon} ${trendPercent}`;
            trendEl.className = 'value ' + trendInfo.trend;
            
            const statusEl = document.getElementById('panel-status');
            statusEl.textContent = status.label;
            statusEl.style.color = status.color;
            
            document.getElementById('panel-suggestion').textContent = suggestedTime;

            let suggestionText = '';
            const ratio = crowd / capacity;
            if (ratio > 0.67) {
                suggestionText = `${name}当前较为拥挤，建议您选择${suggestedTime}时段前往，此时游客较少，游览体验更佳。您也可以考虑前往湖滨或苏堤等相对畅通的景点。`;
            } else if (ratio > 0.4) {
                suggestionText = `${name}当前人流适中，适合游览。如果您偏好更安静的环境，建议在${suggestedTime}时段到访。`;
            } else {
                suggestionText = `${name}当前游客较少，是游览的好时机！建议您把握当前时段前往，避免错过最佳游览体验。`;
            }
            document.getElementById('panel-suggestion-text').textContent = suggestionText;

            renderChart(historyData.hours, historyData.values, new Date().getHours(), capacity);

            document.getElementById('detail-panel').classList.add('show');
        }

        function closeDetailPanel() {
            document.getElementById('detail-panel').classList.remove('show');
        }

        const API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : '/api';
        let chatHistory = [];

        function toggleChat() {
            const panel = document.getElementById('chat-panel');
            panel.classList.toggle('show');
            
            if (panel.classList.contains('show') && chatHistory.length === 0) {
                addBotMessage('你好！👋 我是西湖景区智能导游。\n\n我可以帮您：\n📊 预测景点客流（输入：预测断桥）\n🗺️ 规划游览路线（输入：路线 断桥 雷峰塔）\n\n有什么可以帮您的吗？');
            }
        }

        function addBotMessage(text) {
            const messagesDiv = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot';
            msgDiv.textContent = text;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            chatHistory.push({ role: 'bot', text });
        }

        function addUserMessage(text) {
            const messagesDiv = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message user';
            msgDiv.textContent = text;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            chatHistory.push({ role: 'user', text });
        }

        function addTypingIndicator() {
            const messagesDiv = document.getElementById('chat-messages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typing-indicator';
            typingDiv.textContent = '正在思考...';
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTypingIndicator() {
            const typing = document.getElementById('typing-indicator');
            if (typing) typing.remove();
        }

        function handleChatKeypress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function sendQuickMessage(text) {
            document.getElementById('chat-input').value = text;
            sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            addUserMessage(message);
            input.value = '';
            addTypingIndicator();

            try {
                const response = await fetch(`${API_BASE}/chat/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                
                const result = await response.json();
                removeTypingIndicator();
                
                addBotMessage(result.reply);
                
                if (result.data) {
                    handleChatData(result.intent, result.data);
                }
            } catch (error) {
                removeTypingIndicator();
                addBotMessage('抱歉，网络连接出了点问题，请稍后再试~');
            }
        }

        function handleChatData(intent, data) {
            if (intent === 'PREDICT' && data.predictions) {
                openPredictDetail(data);
            } else if (intent === 'ROUTE' && data.path) {
                highlightRoute(data.path);
            }
        }

        let predictChartInstance = null;
        
        function openPredictDetail(predictionData) {
            const spot = predictionData.spot;
            const predictions = predictionData.predictions;
            
            closeDetailPanel();
            
            const times = predictions.map(p => p.time);
            const crowds = predictions.map(p => p.crowd);
            
            const panel = document.getElementById('detail-panel');
            const title = document.getElementById('panel-title');
            const current = document.getElementById('panel-current');
            const capacity = document.getElementById('panel-capacity');
            const saturation = document.getElementById('panel-saturation');
            const peak = document.getElementById('panel-peak');
            const rank = document.getElementById('panel-rank');
            const trend = document.getElementById('panel-trend');
            const status = document.getElementById('panel-status');
            const suggestion = document.getElementById('panel-suggestion');
            const suggestionText = document.getElementById('panel-suggestion-text');
            
            title.textContent = `${spot.name} - 客流预测`;
            current.textContent = predictionData.currentCrowd.toLocaleString();
            capacity.textContent = spot.capacity.toLocaleString();
            saturation.textContent = (predictionData.peak.saturation).toFixed(1) + '%';
            peak.textContent = predictionData.peak.crowd.toLocaleString();
            rank.textContent = '预测';
            trend.textContent = '2h';
            trend.className = 'value';
            status.textContent = predictionData.peak.crowd > spot.capacity * 0.67 ? '拥挤预警' : '正常';
            status.style.color = predictionData.peak.crowd > spot.capacity * 0.67 ? '#ff4d4f' : '#52c41a';
            suggestion.textContent = predictionData.peak.time;
            
            suggestionText.textContent = `预计未来2小时峰值出现在${predictionData.peak.time}，峰值约${predictionData.peak.crowd}人（饱和度${predictionData.peak.saturation}%）。请合理安排游览时间。`;
            
            if (!predictChartInstance) {
                predictChartInstance = echarts.init(document.getElementById('chart-container'));
            }
            
            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: 'rgba(0,0,0,0.8)',
                    borderColor: 'rgba(78,205,196,0.3)',
                    textStyle: { color: '#fff' },
                    formatter: function(params) {
                        const data = params[0];
                        return `${data.name}<br/>预测人流: <strong>${data.value}</strong> 人`;
                    }
                },
                grid: {
                    left: '3%', right: '4%', bottom: '3%', top: '10%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    data: times,
                    axisLine: { lineStyle: { color: 'rgba(255,255,255,0.2)' } },
                    axisLabel: { color: 'rgba(255,255,255,0.6)', fontSize: 10 },
                    splitLine: { show: false }
                },
                yAxis: {
                    type: 'value',
                    max: spot.capacity,
                    axisLine: { lineStyle: { color: 'rgba(255,255,255,0.2)' } },
                    axisLabel: { color: 'rgba(255,255,255,0.6)', fontSize: 10 },
                    splitLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
                },
                series: [{
                    name: '预测人流',
                    type: 'line',
                    data: crowds,
                    smooth: true,
                    symbol: 'circle',
                    symbolSize: 6,
                    lineStyle: { color: '#faad14', width: 3 },
                    itemStyle: { color: '#faad14', borderWidth: 2, borderColor: '#fff' },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(250,173,20,0.4)' },
                            { offset: 1, color: 'rgba(250,173,20,0.05)' }
                        ])
                    },
                    markPoint: {
                        data: [
                            { type: 'max', name: '峰值', itemStyle: { color: '#ff4d4f' } }
                        ],
                        label: { color: '#fff', fontSize: 10 }
                    }
                }]
            };
            
            predictChartInstance.setOption(option);
            panel.classList.add('show');
        }

        let routeMarkers = [];
        let routeLines = [];

        function highlightRoute(path) {
            closeDetailPanel();
            
            routeMarkers.forEach(m => map.remove(m));
            routeMarkers = [];
            routeLines.forEach(l => map.remove(l));
            routeLines = [];
            
            const pathCoords = path.map(s => [s.lng, s.lat]);
            
            const line = new AMap.Polyline({
                path: pathCoords,
                strokeColor: '#4ecdc4',
                strokeWeight: 4,
                strokeOpacity: 0.8,
                strokeStyle: 'solid',
                showDir: true
            });
            map.add(line);
            routeLines.push(line);
            
            const bounds = new AMap.Bounds(
                [Math.min(...pathCoords.map(p => p[0])), Math.min(...pathCoords.map(p => p[1]))],
                [Math.max(...pathCoords.map(p => p[0])), Math.max(...pathCoords.map(p => p[1]))]
            );
            map.setBounds(bounds, true, [60, 60, 60, 60]);
        }
    </script>
</body>
</html>
