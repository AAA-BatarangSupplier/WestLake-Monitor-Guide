<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西湖景区实时客流看板</title>
    <script src="https://webapi.amap.com/maps?v=2.0&key=ffd74ab3f94bb8b9c9fe9acfd3366848"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a1628;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        #map-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #update-time {
            position: absolute;
            top: 20px;
            right: 30px;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }
        #legend {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 10;
            background: rgba(0,0,0,0.7);
            padding: 12px 16px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            color: #fff;
            font-size: 13px;
        }
        #legend .item {
            display: flex;
            align-items: center;
            margin: 6px 0;
        }
        #legend .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 6px rgba(255,255,255,0.3);
        }
        #title-bar {
            position: absolute;
            top: 20px;
            left: 30px;
            z-index: 10;
            color: #fff;
        }
        #title-bar h1 {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(100,200,255,0.5);
        }
        #title-bar p {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            margin-top: 4px;
        }
        #stats-bar {
            position: absolute;
            top: 80px;
            right: 30px;
            z-index: 10;
            display: flex;
            gap: 16px;
        }
        .stat-card {
            background: rgba(0,0,0,0.7);
            padding: 12px 20px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            text-align: center;
            min-width: 100px;
        }
        .stat-card .value {
            font-size: 22px;
            font-weight: bold;
            color: #4ecdc4;
        }
        .stat-card .label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-top: 2px;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 16px;
            z-index: 20;
        }
        .custom-marker {
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.8);
            box-shadow: 0 0 15px currentColor;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .custom-marker:hover {
            transform: scale(1.2);
        }
        .ripple {
            position: absolute;
            border-radius: 50%;
            border: 2px solid currentColor;
            animation: ripple-animation 2s infinite;
        }
        @keyframes ripple-animation {
            0% { width: 100%; height: 100%; opacity: 0.8; transform: scale(1); }
            100% { width: 300%; height: 300%; opacity: 0; transform: scale(1.5); }
        }
    </style>
</head>
<body>
    <div id="title-bar">
        <h1>西湖景区实时客流看板</h1>
        <p>实时监控各景点人流密度，智能预警拥堵区域</p>
    </div>

    <div id="stats-bar">
        <div class="stat-card">
            <div class="value" id="total-visitors">0</div>
            <div class="label">总游客数</div>
        </div>
        <div class="stat-card">
            <div class="value" id="crowded-count">0</div>
            <div class="label">拥挤景点</div>
        </div>
        <div class="stat-card">
            <div class="value" id="smooth-count">0</div>
            <div class="label">畅通景点</div>
        </div>
    </div>

    <div id="update-time">数据更新于: --</div>

    <div id="legend">
        <div style="font-weight:bold; margin-bottom:8px; color:rgba(255,255,255,0.9);">拥挤度图例</div>
        <div class="item"><div class="dot" style="background:#1890ff;"></div>空闲 (< 300人)</div>
        <div class="item"><div class="dot" style="background:#52c41a;"></div>舒适 (300-600人)</div>
        <div class="item"><div class="dot" style="background:#faad14;"></div>较挤 (600-1000人)</div>
        <div class="item"><div class="dot" style="background:#ff4d4f;"></div>拥挤 (> 1000人)</div>
    </div>

    <div id="loading">正在加载地图数据...</div>
    <div id="map-container"></div>

    <script>
        const SPOTS = [
            { id: 'duanqiao', name: '断桥', lng: 120.1489, lat: 30.2638, capacity: 1500 },
            { id: 'sudi', name: '苏堤', lng: 120.1366, lat: 30.2434, capacity: 2000 },
            { id: 'leifeng', name: '雷峰塔', lng: 120.1570, lat: 30.2396, capacity: 1200 },
            { id: 'lingyin', name: '灵隐寺', lng: 120.1072, lat: 30.2410, capacity: 1800 },
            { id: 'santan', name: '三潭印月', lng: 120.1467, lat: 30.2420, capacity: 1000 },
            { id: 'hubin', name: '湖滨', lng: 120.1600, lat: 30.2540, capacity: 3000 },
            { id: 'taiziwan', name: '太子湾', lng: 120.1480, lat: 30.2330, capacity: 800 },
            { id: 'quyuan', name: '曲院风荷', lng: 120.1300, lat: 30.2630, capacity: 1000 },
            { id: 'baidi', name: '白堤', lng: 120.1450, lat: 30.2570, capacity: 1800 },
            { id: 'huagang', name: '花港观鱼', lng: 120.1380, lat: 30.2260, capacity: 1200 },
        ];

        const POPULARITY = {
            'duanqiao': 1.2, 'sudi': 1.0, 'leifeng': 0.9, 'lingyin': 0.8,
            'santan': 0.7, 'hubin': 1.1, 'taiziwan': 0.6, 'quyuan': 0.75,
            'baidi': 1.0, 'huagang': 0.85
        };

        function getTimeFactor() {
            const hour = new Date().getHours();
            if (hour >= 6 && hour < 8) return 0.15;
            if (hour >= 8 && hour < 10) return 0.35;
            if (hour >= 10 && hour < 12) return 0.55;
            if (hour >= 12 && hour < 14) return 0.70;
            if (hour >= 14 && hour < 17) return 0.90;
            if (hour >= 17 && hour < 19) return 0.70;
            if (hour >= 19 && hour < 21) return 0.40;
            if (hour >= 21 && hour < 23) return 0.15;
            return 0.05;
        }

        function getStatus(crowd, capacity) {
            const ratio = crowd / capacity;
            if (ratio < 0.2) return { status: 'idle', color: '#1890ff', label: '空闲', level: 0 };
            if (ratio < 0.4) return { status: 'smooth', color: '#52c41a', label: '舒适', level: 1 };
            if (ratio < 0.67) return { status: 'crowded', color: '#faad14', label: '较挤', level: 2 };
            return { status: 'saturated', color: '#ff4d4f', label: '拥挤', level: 3 };
        }

        function getMockData() {
            const timeFactor = getTimeFactor();
            let totalVisitors = 0;
            let crowdedCount = 0;
            let smoothCount = 0;

            const data = SPOTS.map(spot => {
                const randomFactor = 0.85 + Math.random() * 0.30;
                const pop = POPULARITY[spot.id] || 1.0;
                const crowd = Math.floor(spot.capacity * timeFactor * randomFactor * pop);
                const finalCrowd = Math.min(crowd, spot.capacity);
                const status = getStatus(finalCrowd, spot.capacity);

                totalVisitors += finalCrowd;
                if (status.level >= 2) crowdedCount++;
                if (status.level <= 1) smoothCount++;

                return {
                    ...spot,
                    crowd: finalCrowd,
                    status: status
                };
            });

            return { data, totalVisitors, crowdedCount, smoothCount };
        }

        function updateStats(result) {
            document.getElementById('total-visitors').textContent = result.totalVisitors.toLocaleString();
            document.getElementById('crowded-count').textContent = result.crowdedCount;
            document.getElementById('smooth-count').textContent = result.smoothCount;
        }

        function updateTimestamp() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
            document.getElementById('update-time').textContent = `数据更新于: ${timeStr}`;
        }

        let map = null;
        let markers = [];
        let infoWindow = null;
        let refreshTimer = null;

        function createMarker(spotData) {
            const ratio = spotData.crowd / spotData.capacity;
            const size = 18 + ratio * 35;
            
            const markerDiv = document.createElement('div');
            markerDiv.className = 'custom-marker';
            markerDiv.style.width = size + 'px';
            markerDiv.style.height = size + 'px';
            markerDiv.style.backgroundColor = spotData.status.color;
            markerDiv.style.color = spotData.status.color;
            
            const rippleDiv = document.createElement('div');
            rippleDiv.className = 'ripple';
            rippleDiv.style.color = spotData.status.color;
            markerDiv.appendChild(rippleDiv);

            const textDiv = document.createElement('div');
            textDiv.textContent = spotData.name;
            textDiv.style.position = 'absolute';
            textDiv.style.top = '100%';
            textDiv.style.left = '50%';
            textDiv.style.transform = 'translateX(-50%)';
            textDiv.style.marginTop = '4px';
            textDiv.style.whiteSpace = 'nowrap';
            textDiv.style.fontSize = '12px';
            textDiv.style.fontWeight = 'bold';
            textDiv.style.color = '#fff';
            textDiv.style.textShadow = '0 0 4px rgba(0,0,0,0.8)';
            markerDiv.appendChild(textDiv);

            markerDiv.addEventListener('click', function() {
                const ratio = (spotData.crowd / spotData.capacity * 100).toFixed(1);
                const content = `
                    <div style="font-weight:bold;font-size:15px;margin-bottom:8px;color:#fff;">${spotData.name}</div>
                    <div style="line-height:1.8;font-size:13px;">
                        <span style="color:#aaa;">当前人流:</span> <span style="color:#4ecdc4;font-weight:bold;">${spotData.crowd}</span> 人<br/>
                        <span style="color:#aaa;">承载上限:</span> ${spotData.capacity} 人<br/>
                        <span style="color:#aaa;">饱和度:</span> ${ratio}%<br/>
                        <span style="color:#aaa;">状态:</span> <span style="color:${spotData.status.color};font-weight:bold;">${spotData.status.label}</span>
                    </div>
                `;
                infoWindow.setContent(content);
                infoWindow.open(map, [spotData.lng, spotData.lat]);
            });

            const marker = new AMap.Marker({
                position: [spotData.lng, spotData.lat],
                content: markerDiv,
                offset: new AMap.Pixel(-size/2, -size/2)
            });
            return marker;
        }

        function renderMarkers(data) {
            markers.forEach(m => map.remove(m));
            markers = [];
            
            data.forEach(spot => {
                const marker = createMarker(spot);
                markers.push(marker);
            });
            map.add(markers);
        }

        function initMap() {
            map = new AMap.Map('map-container', {
                center: [120.135, 30.248],
                zoom: 13,
                resizeEnable: true,
                mapStyle: 'amap://styles/blue_night'
            });

            infoWindow = new AMap.InfoWindow({
                offset: new AMap.Pixel(0, -30),
                content: '',
                closeWhenClickMap: true
            });

            map.on('complete', function() {
                document.getElementById('loading').style.display = 'none';
                const result = getMockData();
                updateStats(result);
                renderMarkers(result.data);
                updateTimestamp();
                startRealtimeUpdate();
            });
        }

        function updateData() {
            const result = getMockData();
            updateStats(result);
            renderMarkers(result.data);
            updateTimestamp();
        }

        function startRealtimeUpdate() {
            refreshTimer = setInterval(updateData, 8000);
        }

        function stopRealtimeUpdate() {
            if (refreshTimer) {
                clearInterval(refreshTimer);
                refreshTimer = null;
            }
        }

        function checkAndInit() {
            if (typeof AMap !== 'undefined') {
                initMap();
            } else {
                setTimeout(checkAndInit, 200);
            }
        }
        checkAndInit();

        window.addEventListener('resize', () => {
            if (map) map.resize();
        });

        window.addEventListener('beforeunload', stopRealtimeUpdate);
    </script>
</body>
</html>
